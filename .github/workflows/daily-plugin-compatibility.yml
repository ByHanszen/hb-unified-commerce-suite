name: Daily WordPress plugin compatibility

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.php"
      - ".github/workflows/daily-plugin-compatibility.yml"
      - "tests/compatibility/**"
  push:
    branches:
      - main
    paths:
      - "**/*.php"
      - ".github/workflows/daily-plugin-compatibility.yml"
      - "tests/compatibility/**"

permissions:
  contents: read
  issues: write

concurrency:
  group: plugin-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WP_PATH: /tmp/wordpress
  WP_CLI_ALLOW_ROOT: "1"
  DB_NAME: wordpress
  DB_USER: root
  DB_PASSWORD: root
  DB_HOST: 127.0.0.1:3306

jobs:
  php-compatibility:
    name: WordPress latest / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"

    services:
      database:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Configure PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, intl, mbstring, mysqli, zip
          tools: wp-cli
          coverage: none

      - name: Install operating-system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mariadb-client rsync unzip

      - name: Lint all PHP files
        run: find . -type f -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Install WordPress latest and WooCommerce latest
        run: bash tests/compatibility/bootstrap-wordpress.sh

      - name: Run baseline smoke test
        run: bash tests/compatibility/smoke-test.sh "WordPress latest, WooCommerce latest, PHP ${{ matrix.php }}"

  plugin-compatibility:
    name: Latest third-party plugins
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      database:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ELEMENTOR_PRO_ZIP_URL: ${{ secrets.ELEMENTOR_PRO_ZIP_URL }}
      LEAT_ZIP_URL: ${{ secrets.LEAT_ZIP_URL }}
      QLS_SERVICEPOINT_ZIP_URL: ${{ secrets.QLS_SERVICEPOINT_ZIP_URL }}
      WOO_UPDATE_MANAGER_ZIP_URL: ${{ secrets.WOO_UPDATE_MANAGER_ZIP_URL }}
      WPC_PRODUCT_BUNDLES_PREMIUM_ZIP_URL: ${{ secrets.WPC_PRODUCT_BUNDLES_PREMIUM_ZIP_URL }}
      PDF_INVOICES_PREMIUM_TEMPLATES_ZIP_URL: ${{ secrets.PDF_INVOICES_PREMIUM_TEMPLATES_ZIP_URL }}
      WP_MAIL_SMTP_PRO_ZIP_URL: ${{ secrets.WP_MAIL_SMTP_PRO_ZIP_URL }}
      PRIVATE_PLUGIN_DOWNLOAD_TOKEN: ${{ secrets.PRIVATE_PLUGIN_DOWNLOAD_TOKEN }}

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Configure PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, dom, intl, mbstring, mysqli, zip
          tools: wp-cli
          coverage: none

      - name: Install operating-system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mariadb-client rsync unzip

      - name: Install WordPress latest and WooCommerce latest
        run: bash tests/compatibility/bootstrap-wordpress.sh

      - name: Test every configured plugin and the combined stack
        run: bash tests/compatibility/check-all-plugins.sh

      - name: Upload compatibility logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-compatibility-logs
          path: /tmp/hb-compatibility
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Report compatibility status
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    needs:
      - php-compatibility
      - plugin-compatibility
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open, update, or close the compatibility issue
        uses: actions/github-script@v7
        env:
          PHP_RESULT: ${{ needs.php-compatibility.result }}
          PLUGIN_RESULT: ${{ needs.plugin-compatibility.result }}
        with:
          script: |
            const title = '[Compatibility] Daily WordPress plugin check failed';
            const failed = process.env.PHP_RESULT !== 'success' || process.env.PLUGIN_RESULT !== 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The automated compatibility check found a problem.',
              '',
              `- PHP/WordPress baseline: **${process.env.PHP_RESULT}**`,
              `- Third-party plugins: **${process.env.PLUGIN_RESULT}**`,
              `- Workflow run: ${runUrl}`,
              '',
              'Open the workflow run and download the `plugin-compatibility-logs` artifact for the per-plugin output.',
              '',
              '_This issue is maintained automatically and will be closed after a successful run._'
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);

            if (failed) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body
                });
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Compatibility is restored. Successful workflow run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
